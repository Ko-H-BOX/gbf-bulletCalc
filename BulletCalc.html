<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>グラブル バレット在庫計算機</title>
    <style>
        :root {
            --primary: #34495e;
            --accent: #27ae60;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            padding: 20px;
            max-width: 1000px;
            margin: auto;
            color: var(--primary);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 1.1rem;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        /* フィルタ */
        .filter-area {
            margin-bottom: 15px;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            cursor: pointer;
        }

        /* 入力リスト */
        .bullet-list {
            height: 600px;
            overflow-y: auto;
            border: 1px solid #f0f0f0;
            border-radius: 6px;
        }

        .list-header {
            display: grid;
            grid-template-columns: 1fr 80px 80px;
            gap: 10px;
            padding: 10px;
            background: #f8f9fa;
            font-size: 0.75rem;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #eee;
        }

        .bullet-item {
            display: grid;
            grid-template-columns: 1fr 80px 80px;
            gap: 10px;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid #f9f9f9;
        }

        .bullet-item:hover {
            background: #fcfdfe;
        }

        .bullet-name {
            font-size: 0.85rem;
            font-weight: bold;
            display: block;
        }

        .bullet-type {
            font-size: 0.7rem;
            color: #95a5a6;
        }

        input[type="number"] {
            width: 100%;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 0.9rem;
        }

        input[type="number"]:focus {
            border-color: var(--accent);
            outline: none;
            background: #fafffa;
        }

        /* 結果エリア */
        .result-sticky {
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .mat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .mat-name {
            font-size: 0.85rem;
        }

        .mat-needed {
            font-weight: bold;
            color: var(--error);
            font-size: 0.95rem;
        }

        .no-need {
            color: #bdc3c7;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>

        // ユーザーの入力値を保持
        const userInputs = {}; // { id: { target: 0, stock: 0 } }

        function renderList() {
            const filter = document.getElementById('type-filter').value;
            const container = document.getElementById('bullet-list');
            container.innerHTML = '';

            for (const id in bulletMaster) {
                const item = bulletMaster[id];
                if (filter !== 'all' && item.type !== filter) continue;

                const row = document.createElement('div');
                row.className = 'bullet-item';
                row.innerHTML = `
            <div>
                <span class="bullet-name">${item.name}</span>
                <span class="bullet-type">${item.type}</span>
            </div>
            <input type="number" min="0" placeholder="0" value="${userInputs[id]?.target || ''}" oninput="updateVal('${id}', 'target', this.value)">
            <input type="number" min="0" placeholder="0" value="${userInputs[id]?.stock || ''}" oninput="updateVal('${id}', 'stock', this.value)">
        `;
                container.appendChild(row);
            }
        }

        function updateVal(id, field, val) {
            if (!userInputs[id]) userInputs[id] = { target: 0, stock: 0 };
            userInputs[id][field] = parseInt(val) || 0;
            calculate();
        }

        function calculate() {
            const targets = {}; 
            const stock = {};   
            const finalShortage = {}; 

            // 1. ユーザーの入力を整理
            for (const id in bulletMaster) {
                const input = userInputs[id];
                if (!input) continue;
                
                // 目標数をセット
                if (input.target > 0) targets[id] = input.target;
                
                // 【重要】所持バレットも「名前」ではなく「ID」で在庫管理する
                // これにより consume 関数内で id が一致した時に在庫から引けるようになる
                if (input.stock > 0) stock[id] = input.stock;
            }

            // 2. 消費・分解を行う再帰関数
            function consume(id, requiredQty) {
                // 在庫（作成済みのバレット、または生素材）があるか確認
                const available = stock[id] || 0;
                const usedFromStock = Math.min(available, requiredQty);
                
                // 在庫を減らす
                stock[id] = available - usedFromStock;
                let remainingToNeed = requiredQty - usedFromStock;

                // 在庫で足りない場合
                if (remainingToNeed > 0) {
                    const item = bulletMaster[id];
                    if (item) {
                        // A: レシピがある（バレットである）ならさらに分解
                        for (const matId in item.recipe) {
                            const needPerUnit = item.recipe[matId];
                            consume(matId, needPerUnit * remainingToNeed);
                        }
                    } else {
                        // B: レシピがない（生素材である）なら不足分として集計
                        // IDが日本語名（生素材）の場合はそのまま表示名に、IDの場合はマスターから名前を引く
                        const displayName = bulletMaster[id] ? bulletMaster[id].name : id;
                        finalShortage[displayName] = (finalShortage[displayName] || 0) + remainingToNeed;
                    }
                }
            }

            // 3. すべての目標バレットに対して実行
            for (const id in targets) {
                consume(id, targets[id]);
            }

            displayShortage(finalShortage);
        }

        function displayShortage(shortage) {
            const container = document.getElementById('total-shortage');
            const keys = Object.keys(shortage);

            if (keys.length === 0) {
                container.innerHTML = '<p class="no-need">不足している素材はありません。<br>目標数と所持数を入力してください。</p>';
                return;
            }

            let html = '';
            keys.sort().forEach(mat => {
                html += `
            <div class="mat-row">
                <span class="mat-name">${mat}</span>
                <span class="mat-needed">${shortage[mat].toLocaleString()} <small>個</small></span>
            </div>
        `;
            });
            container.innerHTML = html;
        }

        // 初期表示
        renderList();
    </script>
